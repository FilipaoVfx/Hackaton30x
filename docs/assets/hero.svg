<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480" role="img" aria-label="Expediente Inteligente">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3d91"/>
      <stop offset="1" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="480" fill="url(#bg)"/>

  <!-- grid decor -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- title -->
  <text x="80" y="180" font-family="Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff">Expediente Inteligente</text>
  <text x="82" y="240" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="400" fill="#dbeafe">Convertimos un lead en un expediente listo para cerrar una venta.</text>

  <!-- pipeline chips -->
  <g font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff" filter="url(#soft)">
    <g>
      <rect x="80" y="300" rx="14" ry="14" width="150" height="56" fill="url(#chip)"/>
      <text x="155" y="336" text-anchor="middle">Lead</text>
    </g>
    <text x="248" y="336" font-size="28" fill="#bfdbfe">→</text>
    <g>
      <rect x="278" y="300" rx="14" ry="14" width="210" height="56" fill="url(#chip)"/>
      <text x="383" y="336" text-anchor="middle">Perfilamiento</text>
    </g>
    <text x="506" y="336" font-size="28" fill="#bfdbfe">→</text>
    <g>
      <rect x="536" y="300" rx="14" ry="14" width="190" height="56" fill="url(#chip)"/>
      <text x="631" y="336" text-anchor="middle">Subsidios</text>
    </g>
    <text x="744" y="336" font-size="28" fill="#bfdbfe">→</text>
    <g>
      <rect x="774" y="300" rx="14" ry="14" width="150" height="56" fill="#22c55e"/>
      <text x="849" y="336" text-anchor="middle">Score</text>
    </g>
    <text x="942" y="336" font-size="28" fill="#bfdbfe">→</text>
    <g>
      <rect x="972" y="300" rx="14" ry="14" width="150" height="56" fill="url(#chip)"/>
      <text x="1047" y="336" text-anchor="middle">Asesor</text>
    </g>
  </g>

  <text x="80" y="420" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#93c5fd">Reto Colsubsidio · Perfilamiento inteligente de leads · Hackathon 30x</text>
</svg>
